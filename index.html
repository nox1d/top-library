<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <h1>My Library</h1>
    <button command="show-modal" commandfor="add-book-dialog">Add a book!</button>
    <dialog id="add-book-dialog">
        <form method="dialog">
            <label for="title">Title:</label>
            <input type="text" id="title" name="title" required>
            
            <label for="author">Author:</label>
            <input type="text" id="author" name="author" required>

            <label for="pages">Pages:</label>
            <input type="number" id="pages" name="pages" required>

            <label for="read">Have been read:</label>
            <input type="checkbox" id="read" name="read" value="read">

            <div>
                <button type="button" formmethod="dialog" id="close-btn">Close</button>
                <button type="submit" id="confirm-btn">Confirm</button>
            </div>

        </form>
            
    </dialog>


    <div class="wrapper">

    </div>
    <script src="script.js"></script>
</body>
</html>
